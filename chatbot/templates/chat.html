<!DOCTYPE html>
<html>
<head>
    <title>Legal & Wellness AI Companion</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 650px;
            max-width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        
        .header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }
        
        .header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 15px;
        }
        
        .mode-badge {
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e9ecef;
        }
        
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .mode-btn {
            padding: 10px 28px;
            border: 2px solid transparent;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .mode-btn:hover {
            transform: scale(1.05);
        }
        
        .mode-btn.active-legal {
            background: #1a2a6c;
            color: white;
            border-color: #1a2a6c;
            box-shadow: 0 4px 15px rgba(26, 42, 108, 0.3);
        }
        
        .mode-btn.active-wellness {
            background: #2e7d32;
            color: white;
            border-color: #2e7d32;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }
        
        .mode-btn.inactive {
            background: #e9ecef;
            color: #6c757d;
            border-color: #dee2e6;
        }
        
        .chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.bot {
            align-items: flex-start;
        }
        
        .bubble {
            max-width: 78%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .user .bubble {
            background: #1a2a6c;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot .bubble {
            background: white;
            color: #212529;
            border: 1px solid #dee2e6;
            border-bottom-left-radius: 4px;
        }
        
        .sentiment-tag {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
            color: #6c757d;
        }
        
        .status-bar {
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            padding: 10px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            border-bottom: 1px solid #e9ecef;
        }
        
        .input-area {
            display: flex;
            padding: 15px 20px;
            background: white;
            gap: 12px;
            align-items: center;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #dee2e6;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .input-area input:focus {
            border-color: #1a2a6c;
        }
        
        .input-area button {
            padding: 12px 32px;
            background: #1a2a6c;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .input-area button:hover:not(:disabled) {
            background: #2a3a8c;
            transform: scale(1.02);
        }
        
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .typing {
            color: #6c757d;
            font-style: italic;
            padding: 8px 16px;
        }
        
        /* Scrollbar styling */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-box::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .chat-box::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 10px;
        }
        
        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }
        
        @media (max-width: 480px) {
            .mode-switch {
                flex-wrap: wrap;
            }
            .mode-btn {
                flex: 1;
                text-align: center;
                padding: 8px 16px;
                font-size: 13px;
            }
            .input-area {
                flex-wrap: wrap;
            }
            .input-area input {
                flex: 1 1 100%;
            }
            .input-area button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h2>⚖️ Legal & 🌿 Wellness AI</h2>
        <p>Your emotionally intelligent assistant</p>
    </div>
    
    <!-- Mode Badge -->
    <div class="mode-badge">
        Current Mode: <span id="modeDisplay">⚖️ Legal</span>
    </div>
    
    <!-- Mode Switch -->
    <div class="mode-switch">
        <button id="legalBtn" class="mode-btn active-legal">⚖️ Legal Mode</button>
        <button id="wellnessBtn" class="mode-btn inactive">🌿 Wellness Mode</button>
    </div>
    
    <!-- Chat Box -->
    <div id="chatBox" class="chat-box"></div>
    
    <!-- Status Bar -->
    <div id="statusBar" class="status-bar">🤖 Sentiment: Neutral | Mode: Legal</div>
    
    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autofocus>
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    // Configuration
    let sessionId = 'user_' + Date.now();
    let currentMode = 'legal';
    let isProcessing = false;
    
    // DOM Elements
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusBar = document.getElementById('statusBar');
    const legalBtn = document.getElementById('legalBtn');
    const wellnessBtn = document.getElementById('wellnessBtn');
    const modeDisplay = document.getElementById('modeDisplay');
    
    // Add initial welcome message
    function addWelcomeMessage() {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `<div class="bubble">Hello! I'm your AI companion. Ask me about legal terms or wellness tips. I'll adapt to your mood! 🌟</div>`;
        chatBox.appendChild(div);
    }
    addWelcomeMessage();
    
    // Add a message to the chat
    function addMessage(text, sender, sentiment = null) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        
        let html = `<div class="bubble">${escapeHtml(text)}</div>`;
        if (sentiment && sender === 'bot') {
            html += `<div class="sentiment-tag">😊 Sentiment: ${sentiment}</div>`;
        }
        div.innerHTML = html;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // Simple HTML escape to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Show typing indicator
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'typingIndicator';
        div.innerHTML = `<div class="bubble typing">⏳ Bot is thinking...</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }
    
    // Send message to backend
    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg || isProcessing) {
            userInput.focus();
            return;
        }
        
        // Disable input while processing
        isProcessing = true;
        sendBtn.disabled = true;
        sendBtn.textContent = '⏳';
        userInput.disabled = true;
        
        // Add user message
        addMessage(msg, 'user');
        userInput.value = '';
        userInput.focus();
        
        // Show typing indicator
        showTyping();
        
        try {
            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: msg,
                    session_id: sessionId,
                    mode: currentMode
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            removeTyping();
            
            if (data.response) {
                addMessage(data.response, 'bot', data.sentiment || 'NEUTRAL');
                statusBar.textContent = `🤖 Sentiment: ${data.sentiment || 'NEUTRAL'} | Mode: ${(data.mode || currentMode).toUpperCase()}`;
            } else if (data.error) {
                addMessage(`⚠️ Error: ${data.error}`, 'bot');
                statusBar.textContent = '❌ Error';
            }
            
        } catch (error) {
            removeTyping();
            addMessage(`⚠️ Cannot reach server. Make sure Django is running. Error: ${error.message}`, 'bot');
            statusBar.textContent = '❌ Connection Error';
            console.error('Fetch error:', error);
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
            userInput.disabled = false;
            userInput.focus();
        }
    }
    
    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Mode switching
    function setMode(mode) {
        if (mode === currentMode || isProcessing) return;
        
        currentMode = mode;
        
        // Update mode display
        modeDisplay.textContent = mode === 'legal' ? '⚖️ Legal' : '🌿 Wellness';
        
        // Update button styles
        if (mode === 'legal') {
            legalBtn.className = 'mode-btn active-legal';
            wellnessBtn.className = 'mode-btn inactive';
            statusBar.textContent = '🔄 Switched to LEGAL mode';
        } else {
            legalBtn.className = 'mode-btn inactive';
            wellnessBtn.className = 'mode-btn active-wellness';
            statusBar.textContent = '🔄 Switched to WELLNESS mode';
        }
        
        // Add system message
        const modeMsg = mode === 'legal' 
            ? '⚖️ Switched to Legal Mode. Ask me about contracts, terms, and legal concepts!' 
            : '🌿 Switched to Wellness Mode. How can I support your mental health today?';
        addMessage(modeMsg, 'bot');
        
        // Update status after a moment
        setTimeout(() => {
            statusBar.textContent = `🤖 Sentiment: Neutral | Mode: ${mode.toUpperCase()}`;
        }, 1500);
    }
    
    legalBtn.addEventListener('click', () => setMode('legal'));
    wellnessBtn.addEventListener('click', () => setMode('wellness'));
    
    // Auto-focus on page load
    userInput.focus();
    
    // Test API connection on load
    async function testConnection() {
        try {
            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Hello',
                    session_id: 'test',
                    mode: 'legal'
                })
            });
            if (response.ok) {
                console.log('✅ API connection successful!');
            } else {
                console.warn('⚠️ API returned status:', response.status);
            }
        } catch (error) {
            console.error('❌ Cannot connect to server. Make sure Django is running on port 8000');
            // Only show error if no messages exist yet
            if (chatBox.children.length <= 1) {
                addMessage('⚠️ Cannot connect to server. Please run: python manage.py runserver', 'bot');
            }
        }
    }
    testConnection();
</script>
</body>
</html>
