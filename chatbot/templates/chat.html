<!DOCTYPE html>
<html>
<head>
    <title>Legal & Wellness AI Companion</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ===== LIGHT MODE (Default) ===== */
        :root {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-chat: #fafafa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            --bubble-user: #1a2a6c;
            --bubble-bot: #ffffff;
            --shadow: 0 20px 60px rgba(0,0,0,0.15);
            --header-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        }

        /* ===== DARK MODE ===== */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-chat: #1a1a2e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a4a;
            --bubble-user: #4a6fa5;
            --bubble-bot: #2a2a4a;
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --header-gradient: linear-gradient(135deg, #0d1b3e, #6a1a1a, #8a6a1a);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            width: 700px;
            max-width: 100%;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header {
            background: var(--header-gradient);
            color: white;
            padding: 20px 20px;
            text-align: center;
            position: relative;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .header p {
            margin: 3px 0 0;
            opacity: 0.9;
            font-size: 13px;
        }

        .theme-toggle {
            position: absolute;
            top: 12px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .mode-badge {
            text-align: center;
            padding: 6px;
            background: var(--bg-chat);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-chat);
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .mode-btn {
            padding: 8px 22px;
            border: 2px solid transparent;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .mode-btn.active-legal {
            background: #1a2a6c;
            color: white;
            border-color: #1a2a6c;
        }

        .mode-btn.active-wellness {
            background: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }

        .mode-btn.inactive {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-color: var(--border-color);
        }

        /* ===== CHAT BOX ===== */
        .chat-box {
            height: 380px;
            overflow-y: auto;
            padding: 15px 20px;
            background: var(--bg-chat);
            transition: all 0.3s ease;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .bubble {
            max-width: 78%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: var(--bubble-bot);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .sentiment-tag {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            color: var(--text-secondary);
        }

        .status-bar {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 6px;
            background: var(--bg-chat);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .input-area {
            display: flex;
            padding: 12px 18px;
            background: var(--bg-secondary);
            gap: 10px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .input-area input {
            flex: 1;
            padding: 10px 18px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            background: var(--bg-chat);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            border-color: #1a2a6c;
        }

        .input-area input::placeholder {
            color: var(--text-secondary);
        }

        .input-area button {
            padding: 10px 24px;
            background: #1a2a6c;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .input-area button:hover:not(:disabled) {
            background: #2a3a8c;
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== ACTION BUTTONS ===== */
        .actions {
            display: flex;
            gap: 8px;
            padding: 10px 18px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }

        .action-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--bg-chat);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--bubble-user);
            color: white;
            border-color: var(--bubble-user);
        }

        .action-btn.danger:hover {
            background: #dc3545;
            border-color: #dc3545;
        }

        .typing {
            color: var(--text-secondary);
            font-style: italic;
            padding: 6px 14px;
            font-size: 13px;
        }

        /* ===== SCROLLBAR ===== */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: var(--bg-chat);
            border-radius: 10px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }

        @media (max-width: 480px) {
            .mode-switch { flex-wrap: wrap; }
            .mode-btn { flex: 1; text-align: center; padding: 6px 12px; font-size: 12px; }
            .input-area { flex-wrap: wrap; }
            .input-area input { flex: 1 1 100%; }
            .input-area button { flex: 1; }
            .actions { justify-content: center; }
            .theme-toggle { top: 8px; right: 8px; font-size: 18px; padding: 4px 8px; }
            .header h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ===== HEADER ===== -->
    <div class="header">
        <h2>⚖️ Legal & 🌿 Wellness AI</h2>
        <p>Your emotionally intelligent assistant</p>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
    </div>

    <!-- ===== MODE BADGE ===== -->
    <div class="mode-badge">
        Current Mode: <span id="modeDisplay">⚖️ Legal</span>
    </div>

    <!-- ===== MODE SWITCH ===== -->
    <div class="mode-switch">
        <button id="legalBtn" class="mode-btn active-legal">⚖️ Legal Mode</button>
        <button id="wellnessBtn" class="mode-btn inactive">🌿 Wellness Mode</button>
    </div>

    <!-- ===== CHAT BOX ===== -->
    <div id="chatBox" class="chat-box"></div>

    <!-- ===== STATUS BAR ===== -->
    <div id="statusBar" class="status-bar">🤖 Sentiment: Neutral | Mode: Legal</div>

    <!-- ===== ACTION BUTTONS ===== -->
    <div class="actions">
        <button class="action-btn" id="pdfUploadBtn">📄 Upload PDF for Analysis</button>
        <button class="action-btn" id="exportTextBtn">📄 Export as Text</button>
        <button class="action-btn" id="exportPdfBtn">📕 Export as PDF</button>
        <button class="action-btn" id="exportJsonBtn">📊 Export as JSON</button>
        <button class="action-btn danger" id="clearChatBtn">🗑️ Clear Chat</button>
    </div>

    <!-- ===== INPUT AREA ===== -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autofocus>
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    // =============================================
    // ===== DARK MODE =====
    // =============================================
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });

    // =============================================
    // ===== CHAT LOGIC =====
    // =============================================
    let sessionId = 'user_' + Date.now();
    let currentMode = 'legal';
    let isProcessing = false;

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusBar = document.getElementById('statusBar');
    const legalBtn = document.getElementById('legalBtn');
    const wellnessBtn = document.getElementById('wellnessBtn');
    const modeDisplay = document.getElementById('modeDisplay');

    // Welcome message
    function addWelcomeMessage() {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `<div class="bubble">Hello! I'm your AI companion. Ask me about legal terms or wellness tips. I'll adapt to your mood! 🌟</div>`;
        chatBox.appendChild(div);
    }
    addWelcomeMessage();

    function addMessage(text, sender, sentiment = null) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        let html = `<div class="bubble">${escapeHtml(text)}</div>`;
        if (sentiment && sender === 'bot') {
            html += `<div class="sentiment-tag">😊 Sentiment: ${sentiment}</div>`;
        }
        div.innerHTML = html;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'typingIndicator';
        div.innerHTML = `<div class="bubble typing">⏳ Bot is thinking...</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    // =============================================
    // ===== SEND MESSAGE =====
    // =============================================
    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg || isProcessing) {
            userInput.focus();
            return;
        }

        isProcessing = true;
        sendBtn.disabled = true;
        sendBtn.textContent = '⏳';
        userInput.disabled = true;

        addMessage(msg, 'user');
        userInput.value = '';
        userInput.focus();
        showTyping();

        try {
            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: msg,
                    session_id: sessionId,
                    mode: currentMode
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `HTTP ${response.status}`);
            }

            const data = await response.json();
            removeTyping();

            if (data.response) {
                addMessage(data.response, 'bot', data.sentiment || 'NEUTRAL');
                statusBar.textContent = `🤖 Sentiment: ${data.sentiment || 'NEUTRAL'} | Mode: ${(data.mode || currentMode).toUpperCase()}`;
            } else if (data.error) {
                addMessage(`⚠️ Error: ${data.error}`, 'bot');
                statusBar.textContent = '❌ Error';
            }

        } catch (error) {
            removeTyping();
            addMessage(`⚠️ Cannot reach server. Make sure Django is running. Error: ${error.message}`, 'bot');
            statusBar.textContent = '❌ Connection Error';
            console.error('Fetch error:', error);
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
            userInput.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    // =============================================
    // ===== MODE SWITCHING =====
    // =============================================
    function setMode(mode) {
        if (mode === currentMode || isProcessing) return;
        currentMode = mode;
        modeDisplay.textContent = mode === 'legal' ? '⚖️ Legal' : '🌿 Wellness';

        if (mode === 'legal') {
            legalBtn.className = 'mode-btn active-legal';
            wellnessBtn.className = 'mode-btn inactive';
            statusBar.textContent = '🔄 Switched to LEGAL mode';
        } else {
            legalBtn.className = 'mode-btn inactive';
            wellnessBtn.className = 'mode-btn active-wellness';
            statusBar.textContent = '🔄 Switched to WELLNESS mode';
        }

        const modeMsg = mode === 'legal' 
            ? '⚖️ Switched to Legal Mode. Ask me about contracts, terms, and legal concepts!' 
            : '🌿 Switched to Wellness Mode. How can I support your mental health today?';
        addMessage(modeMsg, 'bot');

        setTimeout(() => {
            statusBar.textContent = `🤖 Sentiment: Neutral | Mode: ${mode.toUpperCase()}`;
        }, 1500);
    }

    legalBtn.addEventListener('click', () => setMode('legal'));
    wellnessBtn.addEventListener('click', () => setMode('wellness'));
    userInput.focus();

    // =============================================
    // ===== EXPORT FUNCTIONS =====
    // =============================================
    function getMessages() {
        const messages = [];
        const messageElements = chatBox.querySelectorAll('.message');
        messageElements.forEach(el => {
            const bubble = el.querySelector('.bubble');
            if (bubble) {
                const text = bubble.textContent;
                const role = el.classList.contains('user') ? 'user' : 'assistant';
                // Skip welcome message and system messages
                if (text.includes('Hello! I\'m your AI companion') || 
                    text.includes('Switched to') ||
                    text.includes('Chat cleared')) {
                    return;
                }
                messages.push({ role, content: text });
            }
        });
        return messages;
    }

    function getFormattedText() {
        const messages = getMessages();
        let lines = [];
        lines.push('=' .repeat(50));
        lines.push('Legal & Wellness AI - Chat Export');
        lines.push(`Date: ${new Date().toLocaleString()}`);
        lines.push('=' .repeat(50));
        lines.push('');
        
        messages.forEach(msg => {
            const role = msg.role === 'user' ? 'User' : 'Assistant';
            lines.push(`${role}: ${msg.content}`);
            lines.push('-'.repeat(40));
        });
        
        lines.push('');
        lines.push('=' .repeat(50));
        lines.push('End of conversation');
        lines.push('For professional advice, consult a licensed professional.');
        
        return lines.join('\n');
    }

    function exportText() {
        const content = getFormattedText();
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat_export_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function exportJSON() {
        const messages = getMessages();
        const data = {
            export_date: new Date().toISOString(),
            messages: messages
        };
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat_export_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearChat() {
        if (confirm('Are you sure you want to clear the chat?')) {
            // Remove all messages except welcome
            const messages = chatBox.querySelectorAll('.message');
            messages.forEach(msg => {
                const bubble = msg.querySelector('.bubble');
                if (bubble && !bubble.textContent.includes('Hello! I\'m your AI companion')) {
                    msg.remove();
                }
            });
            addMessage('Chat cleared! Start a new conversation. 🌟', 'bot');
            statusBar.textContent = '🗑️ Chat cleared';
        }
    }

    // =============================================
    // ===== EVENT LISTENERS FOR ACTIONS =====
    // =============================================
     document.getElementById('pdfUploadBtn').addEventListener('click', () => {
        window.location.href = '/pdf-upload/';
    });
    document.getElementById('exportTextBtn').addEventListener('click', exportText);
    document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
    document.getElementById('clearChatBtn').addEventListener('click', clearChat);

    // =============================================
    // ===== TEST CONNECTION =====
    // =============================================
    async function testConnection() {
        try {
            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Hello',
                    session_id: 'test',
                    mode: 'legal'
                })
            });
            if (response.ok) {
                console.log('✅ API connection successful!');
            } else {
                console.warn('⚠️ API returned status:', response.status);
            }
        } catch (error) {
            console.error('❌ Cannot connect to server.');
            if (chatBox.children.length <= 1) {
                addMessage('⚠️ Cannot connect to server. Please run: python manage.py runserver', 'bot');
            }
        }
    }

    // =============================================
// ===== PDF EXPORT =====
// =============================================
async function exportPDF() {
    try {
        const response = await fetch('/api/export/pdf/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'PDF export failed');
        }
        
        // Download PDF
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat_export_${Date.now()}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        statusBar.textContent = '✅ PDF exported successfully!';
        
    } catch (error) {
        console.error('PDF export error:', error);
        statusBar.textContent = '❌ PDF export failed: ' + error.message;
        addMessage(`⚠️ PDF Export Error: ${error.message}`, 'bot');
    }
}

// =============================================
// ===== TEXT EXPORT =====
// =============================================
async function exportText() {
    try {
        const response = await fetch('/api/export/text/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Text export failed');
        }
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat_export_${Date.now()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        statusBar.textContent = '✅ Text exported successfully!';
        
    } catch (error) {
        console.error('Text export error:', error);
        statusBar.textContent = '❌ Text export failed: ' + error.message;
        addMessage(`⚠️ Text Export Error: ${error.message}`, 'bot');
    }
}

// =============================================
// ===== JSON EXPORT =====
// =============================================
async function exportJSON() {
    try {
        const response = await fetch('/api/export/json/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'JSON export failed');
        }
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat_export_${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        statusBar.textContent = '✅ JSON exported successfully!';
        
    } catch (error) {
        console.error('JSON export error:', error);
        statusBar.textContent = '❌ JSON export failed: ' + error.message;
        addMessage(`⚠️ JSON Export Error: ${error.message}`, 'bot');
    }
}

// =============================================
// ===== EVENT LISTENERS =====
// =============================================
document.getElementById('exportTextBtn').addEventListener('click', exportText);
document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
document.getElementById('clearChatBtn').addEventListener('click', clearChat);
    testConnection();
</script>
</body>
</html>
